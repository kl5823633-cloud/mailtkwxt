<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TempMail Pro V3 – by Lê Viết Tấn Khang</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ... (Giữ nguyên phần Style của bạn đã cung cấp) ... */
:root{--bg:#080c10;--bg2:#0e1318;--bg3:#141a22;--surface:#19202a;--surface2:#1f2836;--border:#232d3a;--border2:#2a3545;--accent:#00d4a0;--accent2:#00b589;--accent-glow:rgba(0,212,160,0.18);--text:#e2eaf4;--text2:#8da0b4;--text3:#546272;--danger:#ff4b6e;--warn:#f59e0b;--coin:#fbbf24;--radius:14px;--radius-sm:8px;--shadow:0 8px 32px rgba(0,0,0,0.5);}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;}
.view{display:none;min-height:100vh;}.view.active{display:flex;}
#view-login,#view-register{flex-direction:column;justify-content:center;align-items:center;background:radial-gradient(ellipse at 50% 0%,rgba(0,212,160,0.08) 0%,transparent 65%),var(--bg);padding:20px;}
.auth-logo{font-family:'Space Mono',monospace;font-size:1.7em;font-weight:700;color:var(--accent);letter-spacing:-1px;margin-bottom:8px;text-align:center;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 32px;width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,0.6);}
.form-group{margin-bottom:18px;}.form-input{width:100%;padding:13px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);color:#fff;outline:none;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border:none;border-radius:var(--radius-sm);font-weight:600;cursor:pointer;transition:all 0.25s;}
.btn-primary{background:var(--accent);color:#000;}.btn-full{width:100%;}
.navbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;backdrop-filter:blur(12px);}
.main-layout{display:grid;grid-template-columns:320px 1fr;gap:20px;padding:20px;max-width:1600px;margin:0 auto;width:100%;flex:1;}
.sidebar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;height:fit-content;}
.main-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;min-height:540px;}
.email-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;}
.email-item.active{border-color:var(--accent);background:rgba(0,212,160,0.04);}
.mail-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);justify-content:center;align-items:center;z-index:500;}
.modal-overlay.open{display:flex;}.modal-box{background:var(--surface);border-radius:18px;padding:28px;width:90%;max-width:560px;max-height:82vh;overflow-y:auto;}
.sub-lock{position:absolute;inset:0;background:rgba(8,12,16,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;text-align:center;}
.toast-container{position:fixed;top:70px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--surface2);border-radius:10px;padding:12px 18px;animation:toastIn 0.3s ease;}
@keyframes toastIn{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}
/* ... (Thêm các style bổ sung nếu cần) ... */
</style>
</head>
<body>

<div id="view-login" class="view active">
  <div class="auth-logo">⚡ TempMail Pro</div>
  <div class="auth-card">
    <div class="auth-title">🔐 Đăng nhập</div>
    <div id="login-msg"></div>
    <input class="form-input" id="login-user" type="text" placeholder="Tên đăng nhập">
    <input class="form-input" id="login-pass" type="password" placeholder="Mật khẩu" style="margin-top:10px;">
    <button class="btn btn-primary btn-full" onclick="doLogin()" style="margin-top:15px;">Đăng nhập</button>
  </div>
  <div class="auth-link-row" style="margin-top:20px;">Chưa có tài khoản? <a href="#" onclick="showView('register')">Đăng ký</a></div>
</div>

<div id="view-register" class="view">
    <div class="auth-logo">⚡ TempMail Pro</div>
    <div class="auth-card">
      <div class="auth-title">📝 Đăng ký</div>
      <div id="reg-msg"></div>
      <input class="form-input" id="reg-user" type="text" placeholder="Tên đăng nhập">
      <input class="form-input" id="reg-pass" type="password" placeholder="Mật khẩu" style="margin-top:10px;">
      <input class="form-input" id="reg-pass2" type="password" placeholder="Nhập lại mật khẩu" style="margin-top:10px;">
      <button class="btn btn-primary btn-full" onclick="doRegister()" style="margin-top:15px;">Tạo tài khoản</button>
    </div>
    <div class="auth-link-row" style="margin-top:20px;">Đã có tài khoản? <a href="#" onclick="showView('login')">Đăng nhập</a></div>
</div>

<div id="view-dashboard" class="view">
    <nav class="navbar">
        <div class="nav-brand">⚡ TempMail</div>
        <div class="navbar-right" style="display:flex; gap:15px; align-items:center;">
            <div class="coin-badge" onclick="openCoinModal()">🪙 <span id="nav-coins">0</span> xu</div>
            <span id="nav-username"></span>
            <a href="#" onclick="doLogout()">Thoát</a>
        </div>
    </nav>
    <div class="main-layout">
        <div class="sidebar">
            <button class="btn btn-primary btn-full" onclick="createNewEmail()" id="create-btn">✨ Tạo email mới</button>
            <ul id="emailList" style="margin-top:20px; list-style:none;"></ul>
        </div>
        <div class="main-panel" style="position:relative;">
            <div id="sub-lock-overlay" class="sub-lock" style="display:none;">
                <h3>🔒 Cần kích hoạt gói</h3>
                <button class="btn btn-primary" onclick="openCoinModal()">Mở quản lý xu</button>
            </div>
            <div id="main-panel-content">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3 id="currentEmailDisplay">Hộp thư</h3>
                    <button class="btn btn-primary btn-sm" onclick="checkMailbox()">Làm mới</button>
                </div>
                <div id="mailbox" style="margin-top:20px;"></div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-mail">
    <div class="modal-box">
        <h3 id="modal-mail-title"></h3>
        <hr style="margin:15px 0; opacity:0.1;">
        <div id="modal-mail-body"></div>
        <button class="btn btn-primary" style="margin-top:20px;" onclick="closeModal('modal-mail')">Đóng</button>
    </div>
</div>

<div class="modal-overlay" id="modal-coin">
    <div class="modal-box">
        <h3>🪙 Quản lý Xu & Gói</h3>
        <p>Xu của bạn: <strong id="modal-coin-amount">0</strong></p>
        <button class="btn btn-primary btn-full" onclick="collectCoins()" id="collect-btn" style="margin-top:10px;">Nhặt xu hàng ngày</button>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px;">
            <button class="btn btn-primary" onclick="buyPlan('month', 10)">10 xu / Tháng</button>
            <button class="btn btn-primary" onclick="buyPlan('year', 30)">30 xu / Năm</button>
        </div>
        <button class="btn btn-full" style="margin-top:20px;" onclick="closeModal('modal-coin')">Đóng</button>
    </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
/**
 * PHẦN FIX LỖI VÀ TỐI ƯU API
 */

const APIS = ['https://api.mail.gw', 'https://api.mail.tm'];
// Danh sách proxy dự phòng mạnh mẽ hơn
const PROXIES = [
    '', // Thử trực tiếp trước
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?',
    'https://thingproxy.freeboard.io/fetch/',
    'https://api.codetabs.com/v1/proxy/?quest='
];

let currentApiIdx = 0;

// Hàm Fetch thông minh: Tự động thử qua nhiều Proxy nếu lỗi
async function robustFetch(endpoint, options = {}) {
    let lastError;
    const fullUrl = APIS[currentApiIdx] + endpoint;

    for (let proxy of PROXIES) {
        try {
            const targetUrl = proxy ? proxy + encodeURIComponent(fullUrl) : fullUrl;
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 8000); // 8s timeout

            const response = await fetch(targetUrl, {
                ...options,
                signal: controller.signal,
                headers: {
                    ...options.headers,
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                }
            });
            clearTimeout(timeoutId);

            if (response.ok || response.status === 201 || response.status === 422) {
                return response;
            }
        } catch (e) {
            lastError = e;
            continue; // Thử proxy tiếp theo
        }
    }
    
    // Nếu tất cả proxy thất bại ở API 1, đổi sang API 2
    if (currentApiIdx === 0) {
        currentApiIdx = 1;
        return robustFetch(endpoint, options);
    }
    
    throw new Error("Không thể kết nối API. Hãy thử dùng VPN hoặc tải file về máy.");
}

// Hàm lấy Domain (Fix lỗi không tạo được mail)
async function getDomains() {
    try {
        const res = await robustFetch('/domains');
        const data = await res.json();
        return data['hydra:member'] || [];
    } catch (err) {
        toast("Lỗi lấy Domain: " + err.message, "error");
        return [];
    }
}

// Hàm tạo Account
async function createAccount(address, password) {
    return robustFetch('/accounts', {
        method: 'POST',
        body: JSON.stringify({ address, password })
    });
}

// Hàm lấy Token
async function getTokenApi(address, password) {
    const res = await robustFetch('/token', {
        method: 'POST',
        body: JSON.stringify({ address, password })
    });
    const data = await res.json();
    return data.token;
}

// [LOGIC QUẢN LÝ EMAIL]
async function createNewEmail() {
    const user = getSessionUser();
    if (!isSubActive(user)) return toast("Bạn cần kích hoạt gói!", "error");

    const btn = document.getElementById('create-btn');
    btn.disabled = true; btn.innerText = "Đang tạo...";

    try {
        const domains = await getDomains();
        if (domains.length === 0) throw new Error("Không có domain khả dụng");

        const domain = domains[0].domain;
        const username = 'tk' + Math.random().toString(36).substring(2, 10);
        const address = `${username}@${domain}`;
        const password = 'Pass' + Math.random().toString(36);

        const regRes = await createAccount(address, password);
        if (!regRes.ok) throw new Error("Server từ chối tạo mail");

        const token = await getTokenApi(address, password);
        
        // Lưu vào máy
        const saved = getUserEmails(user.username);
        saved[address] = { address, password, token, createdAt: new Date() };
        saveUserEmails(user.username, saved);

        toast("Đã tạo: " + address, "success");
        loadEmails();
    } catch (err) {
        toast("Lỗi: " + err.message, "error");
    } finally {
        btn.disabled = false; btn.innerText = "✨ Tạo email mới";
    }
}

// Hàm kiểm tra Mailbox (Fix lỗi không nhận được mã)
async function checkMailbox() {
    if (!window.currentSelectedEmail) return;
    const mailbox = document.getElementById('mailbox');
    
    try {
        const user = getSessionUser();
        const emailData = getUserEmails(user.username)[window.currentSelectedEmail];
        
        const res = await robustFetch('/messages', {
            headers: { 'Authorization': `Bearer ${emailData.token}` }
        });

        if (res.status === 401) { // Token hết hạn, tự refresh
            const newToken = await getTokenApi(emailData.address, emailData.password);
            emailData.token = newToken;
            const saved = getUserEmails(user.username);
            saved[window.currentSelectedEmail] = emailData;
            saveUserEmails(user.username, saved);
            return checkMailbox(); 
        }

        const data = await res.json();
        const msgs = data['hydra:member'] || [];

        if (msgs.length === 0) {
            mailbox.innerHTML = `<div style="text-align:center; padding:40px; color:#546272;">
                <p>Hộp thư trống...</p>
                <small>Đang tự động kiểm tra sau mỗi 5 giây</small>
            </div>`;
        } else {
            mailbox.innerHTML = msgs.map(m => `
                <div class="mail-item" onclick="viewMail('${m.id}')">
                    <div style="color:var(--accent); font-weight:bold;">${m.from.address}</div>
                    <div style="margin:5px 0;">${m.subject}</div>
                    <small style="color:var(--text3);">${new Date(m.createdAt).toLocaleTimeString()}</small>
                </div>
            `).join('');
        }
    } catch (err) {
        console.error(err);
    }
}

// Xem chi tiết mail
async function viewMail(id) {
    const user = getSessionUser();
    const emailData = getUserEmails(user.username)[window.currentSelectedEmail];
    openModal('modal-mail');
    document.getElementById('modal-mail-body').innerHTML = "Đang tải nội dung...";

    try {
        const res = await robustFetch('/messages/' + id, {
            headers: { 'Authorization': `Bearer ${emailData.token}` }
        });
        const data = await res.json();
        document.getElementById('modal-mail-title').innerText = data.subject;
        document.getElementById('modal-mail-body').innerHTML = data.html || data.text;
    } catch (err) {
        document.getElementById('modal-mail-body').innerText = "Lỗi tải mail.";
    }
}

// Auto-refresh mỗi 5 giây khi người dùng đang ở dashboard
setInterval(() => {
    if (document.getElementById('view-dashboard').classList.contains('active')) {
        checkMailbox();
    }
}, 5000);

// --- CÁC HÀM TIỆN ÍCH GIỮ NGUYÊN TỪ BẢN GỐC ---
function getSessionUser() {
    const session = JSON.parse(sessionStorage.getItem('tempmail_session') || localStorage.getItem('tempmail_remember') || '{}');
    const users = JSON.parse(localStorage.getItem('tempmail_users_v2') || '{}');
    return users[session.username];
}

function getUserEmails(uname) { return JSON.parse(localStorage.getItem('tm_emails_'+uname) || '{}'); }
function saveUserEmails(uname, data) { localStorage.setItem('tm_emails_'+uname, JSON.stringify(data)); }

function isSubActive(user) {
    if(!user || !user.subscription.active) return false;
    return new Date(user.subscription.expiresAt) > new Date();
}

function loadEmails() {
    const user = getSessionUser();
    const emails = Object.values(getUserEmails(user.username));
    const list = document.getElementById('emailList');
    list.innerHTML = emails.map(e => `
        <li class="email-item" onclick="window.currentSelectedEmail='${e.address}'; loadEmails(); checkMailbox();">
            <strong>${e.address}</strong>
        </li>
    `).join('');
    
    // Highlight email đang chọn
    Array.from(list.children).forEach(li => {
        if(li.innerText.includes(window.currentSelectedEmail)) li.classList.add('active');
    });
}

function toast(m, type="info") {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerText = m;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Khởi tạo Login/Register (Giữ nguyên logic của bạn nhưng bọc lại)
async function doLogin() {
    const u = document.getElementById('login-user').value;
    const p = document.getElementById('login-pass').value;
    const users = JSON.parse(localStorage.getItem('tempmail_users_v2') || '{}');
    if(users[u]) {
        sessionStorage.setItem('tempmail_session', JSON.stringify({username: u}));
        showDashboard(u);
    } else { toast("Sai tài khoản!", "error"); }
}

function doRegister() {
    const u = document.getElementById('reg-user').value;
    const p = document.getElementById('reg-pass').value;
    const users = JSON.parse(localStorage.getItem('tempmail_users_v2') || '{}');
    users[u] = { username: u, password: p, coins: 10, subscription: {active: false}, createdAt: new Date() };
    localStorage.setItem('tempmail_users_v2', JSON.stringify(users));
    toast("Đăng ký xong! Nhận 10 xu.", "success");
    showView('login');
}

function showDashboard(uname) {
    showView('dashboard');
    document.getElementById('nav-username').innerText = uname;
    const user = getSessionUser();
    document.getElementById('nav-coins').innerText = user.coins;
    document.getElementById('sub-lock-overlay').style.display = isSubActive(user) ? 'none' : 'flex';
    loadEmails();
}

function showView(v) {
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    document.getElementById('view-'+v).classList.add('active');
}

function doLogout() {
    sessionStorage.clear();
    localStorage.removeItem('tempmail_remember');
    location.reload();
}

// Quản lý xu
function collectCoins() {
    const user = getSessionUser();
    const users = JSON.parse(localStorage.getItem('tempmail_users_v2'));
    users[user.username].coins += 2;
    localStorage.setItem('tempmail_users_v2', JSON.stringify(users));
    toast("Bạn nhận được 2 xu!", "success");
    showDashboard(user.username);
}

function buyPlan(type, price) {
    const user = getSessionUser();
    const users = JSON.parse(localStorage.getItem('tempmail_users_v2'));
    if(user.coins >= price) {
        users[user.username].coins -= price;
        let date = new Date();
        if(type === 'month') date.setMonth(date.getMonth() + 1);
        else date.setFullYear(date.getFullYear() + 1);
        users[user.username].subscription = { active: true, expiresAt: date };
        localStorage.setItem('tempmail_users_v2', JSON.stringify(users));
        toast("Kích hoạt thành công!", "success");
        closeModal('modal-coin');
        showDashboard(user.username);
    } else { toast("Không đủ xu!", "error"); }
}

function openCoinModal() {
    const user = getSessionUser();
    document.getElementById('modal-coin-amount').innerText = user.coins;
    openModal('modal-coin');
}

// Kiểm tra session khi load
window.onload = () => {
    const u = getSessionUser();
    if(u) showDashboard(u.username);
};
</script>
</body>
</html>
